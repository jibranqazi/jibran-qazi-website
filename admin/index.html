<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JQ — Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Inter:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --black: #111110;
      --white: #ffffff;
      --off-white: #f9f9f7;
      --light: #e0e0dc;
      --mid: #888885;
    }

    body {
      background: var(--off-white);
      color: var(--black);
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    header {
      background: var(--white);
      border-bottom: 1px solid var(--light);
      padding: 0 48px;
      display: flex;
      justify-content: space-between;
      align-items: stretch;
    }

    .header-brand {
      padding: 28px 0;
      font-size: 11px;
      letter-spacing: 0.4em;
      text-transform: uppercase;
    }

    .header-nav {
      display: flex;
      align-items: stretch;
      gap: 0;
    }

    .nav-tab {
      display: flex;
      align-items: center;
      padding: 0 24px;
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--mid);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .nav-tab:hover { color: var(--black); }
    .nav-tab.active { color: var(--black); border-bottom-color: var(--black); }

    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 60px 48px;
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Stats ── */
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 2px;
      margin-bottom: 48px;
    }

    .stat-card {
      background: var(--white);
      padding: 32px;
      border: 1px solid var(--light);
    }

    .stat-label {
      font-size: 9px;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: var(--mid);
      margin-bottom: 12px;
    }

    .stat-value {
      font-family: 'Cormorant Garamond', serif;
      font-size: 48px;
      font-weight: 300;
      line-height: 1;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .section-label {
      font-size: 9px;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: var(--mid);
    }

    .btn-new {
      font-family: 'Inter', sans-serif;
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      padding: 10px 20px;
      background: var(--black);
      color: var(--white);
      border: none;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: background 0.2s;
    }
    .btn-new:hover { background: #333; }

    /* ── Table ── */
    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--white);
      border: 1px solid var(--light);
    }

    thead tr { border-bottom: 1px solid var(--light); }

    th {
      text-align: left;
      font-size: 9px;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--mid);
      font-weight: 400;
      padding: 16px 24px;
    }

    td {
      padding: 18px 24px;
      font-size: 12px;
      letter-spacing: 0.03em;
      color: var(--black);
      border-bottom: 1px solid var(--off-white);
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--off-white); }

    .badge {
      display: inline-block;
      font-size: 8px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      padding: 4px 10px;
      border: 1px solid var(--light);
      color: var(--mid);
    }
    .badge.email { border-color: var(--black); color: var(--black); }
    .badge.published { border-color: #2ecc71; color: #27ae60; }
    .badge.draft { border-color: var(--light); color: var(--mid); }

    .post-title-link {
      color: var(--black);
      text-decoration: none;
      font-family: 'Cormorant Garamond', serif;
      font-size: 16px;
      font-weight: 300;
    }
    .post-title-link:hover { text-decoration: underline; }

    .action-link {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--mid);
      text-decoration: none;
      cursor: pointer;
      background: none;
      border: none;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      padding: 0;
      margin-right: 16px;
    }
    .action-link:hover { color: var(--black); }
    .action-link.delete:hover { color: #c0392b; }

    .empty {
      text-align: center;
      padding: 80px 24px;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 22px;
      color: var(--mid);
    }

    .loading {
      text-align: center;
      padding: 80px 24px;
      font-size: 10px;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--mid);
    }

    @media (max-width: 640px) {
      header { padding: 0 24px; }
      main { padding: 40px 24px; }
      .stats { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-brand">Jibran Qazi</div>
    <nav class="header-nav">
      <div class="nav-tab active" data-tab="subscribers">Subscribers</div>
      <div class="nav-tab" data-tab="journal">Journal</div>
    </nav>
  </header>

  <main>

    <!-- Subscribers Tab -->
    <div class="tab-panel active" id="tab-subscribers">
      <div class="stats">
        <div class="stat-card">
          <p class="stat-label">Total Subscribers</p>
          <p class="stat-value" id="total">—</p>
        </div>
        <div class="stat-card">
          <p class="stat-label">Email</p>
          <p class="stat-value" id="email-count">—</p>
        </div>
        <div class="stat-card">
          <p class="stat-label">Phone</p>
          <p class="stat-value" id="phone-count">—</p>
        </div>
      </div>

      <p class="section-label" style="margin-bottom:16px;">All Subscribers</p>

      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Contact</th>
            <th>Type</th>
            <th>Subscribed</th>
          </tr>
        </thead>
        <tbody id="sub-table-body">
          <tr><td colspan="4" class="loading">Loading...</td></tr>
        </tbody>
      </table>
    </div>

    <!-- Journal Tab -->
    <div class="tab-panel" id="tab-journal">
      <div class="stats">
        <div class="stat-card">
          <p class="stat-label">Total Entries</p>
          <p class="stat-value" id="post-total">—</p>
        </div>
        <div class="stat-card">
          <p class="stat-label">Published</p>
          <p class="stat-value" id="post-published">—</p>
        </div>
        <div class="stat-card">
          <p class="stat-label">Drafts</p>
          <p class="stat-value" id="post-drafts">—</p>
        </div>
      </div>

      <div class="section-header">
        <p class="section-label">All Entries</p>
        <a href="/admin/write" class="btn-new">+ New Entry</a>
      </div>

      <table>
        <thead>
          <tr>
            <th>Title</th>
            <th>Category</th>
            <th>Status</th>
            <th>Date</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="post-table-body">
          <tr><td colspan="5" class="loading">Loading...</td></tr>
        </tbody>
      </table>
    </div>

  </main>

  <script>
    const auth = 'Basic ' + btoa('admin:' + (sessionStorage.getItem('jqpw') || promptPassword()));

    function promptPassword() {
      const pw = prompt('Enter admin password:');
      if (pw) sessionStorage.setItem('jqpw', pw);
      return pw || '';
    }

    // ── Tab switching ─────────────────────────────────────────────
    document.querySelectorAll('.nav-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
      });
    });

    // ── Load Subscribers ──────────────────────────────────────────
    async function loadSubscribers() {
      try {
        const res = await fetch('/admin/subscribers', { headers: { Authorization: auth } });
        if (res.status === 401) {
          document.getElementById('sub-table-body').innerHTML =
            '<tr><td colspan="4" class="empty">Incorrect password.</td></tr>';
          return;
        }
        const data = await res.json();
        const subs = data.subscribers || [];

        document.getElementById('total').textContent = data.count;
        document.getElementById('email-count').textContent = subs.filter(s => s.type === 'email').length;
        document.getElementById('phone-count').textContent = subs.filter(s => s.type === 'phone').length;

        if (!subs.length) {
          document.getElementById('sub-table-body').innerHTML =
            '<tr><td colspan="4" class="empty">No subscribers yet.</td></tr>';
          return;
        }

        document.getElementById('sub-table-body').innerHTML = subs.map((s, i) => `
          <tr>
            <td>${i + 1}</td>
            <td>${s.contact}</td>
            <td><span class="badge ${s.type}">${s.type}</span></td>
            <td>${new Date(s.subscribedAt).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })}</td>
          </tr>
        `).join('');
      } catch {
        document.getElementById('sub-table-body').innerHTML =
          '<tr><td colspan="4" class="empty">Failed to load.</td></tr>';
      }
    }

    // ── Load Posts ────────────────────────────────────────────────
    async function loadPosts() {
      try {
        const res = await fetch('/admin/api/posts', { headers: { Authorization: auth } });
        if (res.status === 401) {
          document.getElementById('post-table-body').innerHTML =
            '<tr><td colspan="5" class="empty">Incorrect password.</td></tr>';
          return;
        }
        const posts = await res.json();

        const published = posts.filter(p => p.status === 'published').length;
        const drafts = posts.filter(p => p.status === 'draft').length;

        document.getElementById('post-total').textContent = posts.length;
        document.getElementById('post-published').textContent = published;
        document.getElementById('post-drafts').textContent = drafts;

        if (!posts.length) {
          document.getElementById('post-table-body').innerHTML =
            '<tr><td colspan="5" class="empty">No entries yet.</td></tr>';
          return;
        }

        document.getElementById('post-table-body').innerHTML = posts.map(p => `
          <tr>
            <td><a href="/admin/write/${p.slug}" class="post-title-link">${p.title}</a></td>
            <td style="font-size:11px;color:var(--mid);">${p.category}</td>
            <td><span class="badge ${p.status}">${p.status}</span></td>
            <td style="font-size:11px;color:var(--mid);">${p.date || ''}</td>
            <td>
              <a href="/admin/write/${p.slug}" class="action-link">Edit</a>
              <a href="/journal/${p.slug}" target="_blank" class="action-link">View</a>
              <button class="action-link delete" onclick="deletePost('${p.slug}', this)">Delete</button>
            </td>
          </tr>
        `).join('');
      } catch {
        document.getElementById('post-table-body').innerHTML =
          '<tr><td colspan="5" class="empty">Failed to load.</td></tr>';
      }
    }

    async function deletePost(slug, btn) {
      if (!confirm('Delete this entry? This cannot be undone.')) return;
      try {
        await fetch(`/admin/api/posts/${slug}`, {
          method: 'DELETE',
          headers: { Authorization: auth }
        });
        btn.closest('tr').remove();
        loadPosts();
      } catch {
        alert('Failed to delete.');
      }
    }

    loadSubscribers();
    loadPosts();
  </script>

</body>
</html>
