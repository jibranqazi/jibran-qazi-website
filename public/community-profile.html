<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile — Jibran Qazi</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --sand: #ede0cc;
      --deep: #d4c4a8;
      --black: #111110;
      --mid: #888885;
      --light: #ddd8cf;
    }

    body {
      background: var(--sand);
      color: var(--black);
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    body.visible { opacity: 1; }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 28px 48px;
      border-bottom: 1px solid var(--light);
    }
    .wordmark {
      font-family: 'Cormorant Garamond', serif;
      font-size: 13px;
      font-weight: 300;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--black);
    }
    .header-right { display: flex; align-items: center; gap: 24px; }
    .nav-link {
      font-size: 9px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--mid);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-link:hover { color: var(--black); }
    .nav-btn {
      font-size: 9px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--mid);
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      transition: color 0.2s;
    }
    .nav-btn:hover { color: var(--black); }

    main {
      max-width: 840px;
      margin: 0 auto;
      padding: 72px 48px 120px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 9px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--mid);
      text-decoration: none;
      margin-bottom: 56px;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--black); }

    /* ── Profile hero ── */
    .profile-hero {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 48px;
      align-items: start;
      padding-bottom: 56px;
      border-bottom: 1px solid var(--light);
      margin-bottom: 56px;
    }

    .profile-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(36px, 5vw, 60px);
      font-weight: 300;
      line-height: 1.05;
      letter-spacing: -0.01em;
      margin-bottom: 20px;
    }

    /* ── Bio ── */
    .bio-block { margin-bottom: 28px; }

    .bio-text {
      font-size: 14px;
      line-height: 1.8;
      color: var(--black);
      max-width: 520px;
    }
    .bio-empty {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 16px;
      color: var(--mid);
    }

    .bio-edit-form { display: none; }
    .bio-edit-form.open { display: block; }

    .bio-textarea {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 300;
      background: none;
      border: none;
      border-bottom: 1px solid var(--light);
      width: 100%;
      max-width: 520px;
      padding: 0 0 12px;
      color: var(--black);
      outline: none;
      resize: none;
      line-height: 1.8;
      min-height: 72px;
      display: block;
      margin-bottom: 16px;
      transition: border-color 0.2s;
    }
    .bio-textarea:focus { border-bottom-color: var(--black); }
    .bio-textarea::placeholder { color: var(--mid); }

    .bio-actions { display: flex; gap: 16px; align-items: center; }

    .btn-save {
      font-size: 9px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--sand);
      background: var(--black);
      border: 1px solid var(--black);
      padding: 10px 20px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      transition: opacity 0.2s;
    }
    .btn-save:hover { opacity: 0.75; }

    .btn-cancel {
      font-size: 9px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--mid);
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      transition: color 0.2s;
    }
    .btn-cancel:hover { color: var(--black); }

    .edit-bio-btn {
      font-size: 9px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--mid);
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      padding: 0;
      margin-top: 10px;
      display: block;
      transition: color 0.2s;
    }
    .edit-bio-btn:hover { color: var(--black); }

    /* ── Stats ── */
    .profile-stats {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 20px;
      flex-shrink: 0;
    }

    .stat-block { text-align: right; }
    .stat-value {
      font-family: 'Cormorant Garamond', serif;
      font-size: 36px;
      font-weight: 300;
      line-height: 1;
      letter-spacing: -0.01em;
    }
    .stat-label {
      font-size: 8px;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--mid);
      margin-top: 4px;
    }

    .joined-line {
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--mid);
      text-align: right;
    }

    /* ── Posts section ── */
    .posts-section-label {
      font-size: 9px;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: var(--mid);
      margin-bottom: 32px;
    }

    .post-row {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      padding: 24px 0;
      border-bottom: 1px solid var(--light);
      cursor: pointer;
    }
    .post-row:first-of-type { border-top: 1px solid var(--light); }
    .post-row:hover .post-title-link { opacity: 0.55; }

    .upvote-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      min-width: 24px;
      flex-shrink: 0;
      padding-top: 2px;
    }
    .upvote-arrow { font-size: 11px; color: var(--mid); }
    .upvote-count { font-size: 11px; color: var(--mid); }

    .post-content { flex: 1; }
    .post-title-link {
      font-family: 'Cormorant Garamond', serif;
      font-size: 21px;
      font-weight: 300;
      line-height: 1.3;
      letter-spacing: 0.01em;
      margin-bottom: 8px;
      display: block;
      transition: opacity 0.2s;
    }
    .post-meta-line {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--mid);
    }

    .no-posts {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 20px;
      color: var(--mid);
      padding: 32px 0;
    }

    .error-state {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 22px;
      color: var(--mid);
      padding: 80px 0;
    }

    @media (max-width: 640px) {
      header { padding: 20px 24px; }
      main { padding: 48px 24px 80px; }
      .profile-hero { grid-template-columns: 1fr; gap: 32px; }
      .profile-stats { align-items: flex-start; flex-direction: row; gap: 32px; }
      .stat-block { text-align: left; }
      .joined-line { text-align: left; }
    }
  </style>
</head>
<body>

  <header>
    <a class="wordmark" href="/">Jibran Qazi</a>
    <div class="header-right">
      <a class="nav-link" href="/community">Community</a>
      <span id="auth-nav"></span>
    </div>
  </header>

  <main>
    <a class="back-link" href="/community">← Community</a>
    <div id="profile-root"></div>
  </main>

  <script>
    const ACCESS = localStorage.getItem('jq_access');
    const profileSub = window.location.pathname.split('/')[3];
    let currentUserSub = null;
    let profileData = null;

    function esc(s) {
      return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function timeAgo(iso) {
      const diff = Date.now() - new Date(iso).getTime();
      const m = Math.floor(diff / 60000);
      if (m < 1) return 'just now';
      if (m < 60) return m + 'm ago';
      const h = Math.floor(m / 60);
      if (h < 24) return h + 'h ago';
      const d = Math.floor(h / 24);
      if (d < 30) return d + 'd ago';
      return new Date(iso).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
    }

    function joinedDate(iso) {
      if (!iso) return null;
      return new Date(iso).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
    }

    // ── Auth nav ──────────────────────────────────────────────────
    async function initAuth() {
      const nav = document.getElementById('auth-nav');
      if (!ACCESS) {
        nav.innerHTML = `<a class="nav-link" href="/signin">Sign in</a>`;
        return;
      }
      try {
        const r = await fetch('/auth/me', { headers: { Authorization: `Bearer ${ACCESS}` } });
        if (r.ok) {
          const me = await r.json();
          currentUserSub = me.sub;
          nav.innerHTML = `<a class="nav-link" href="/members">Members</a>
            <button class="nav-btn" onclick="signOut()">Sign out</button>`;
        }
      } catch {}
    }

    async function signOut() {
      await fetch('/auth/signout', { method: 'POST', headers: { Authorization: `Bearer ${ACCESS}` } }).catch(() => {});
      ['jq_access','jq_refresh','jq_id'].forEach(k => localStorage.removeItem(k));
      window.location.href = '/';
    }

    // ── Render ────────────────────────────────────────────────────
    function render(data) {
      const isOwn = currentUserSub && currentUserSub === data.sub;
      const joined = joinedDate(data.joinedAt);

      const bioHtml = isOwn
        ? `<div class="bio-block">
            <div id="bio-display">
              ${data.bio
                ? `<p class="bio-text">${esc(data.bio)}</p>`
                : `<p class="bio-empty">No bio yet.</p>`}
              <button class="edit-bio-btn" onclick="openBioEdit()">Edit bio</button>
            </div>
            <div class="bio-edit-form" id="bio-form">
              <textarea class="bio-textarea" id="bio-input" placeholder="Tell the community a little about yourself…" maxlength="500">${esc(data.bio)}</textarea>
              <div class="bio-actions">
                <button class="btn-save" onclick="saveBio()">Save</button>
                <button class="btn-cancel" onclick="closeBioEdit()">Cancel</button>
              </div>
            </div>
          </div>`
        : `<div class="bio-block">
            ${data.bio
              ? `<p class="bio-text">${esc(data.bio)}</p>`
              : `<p class="bio-empty">No bio yet.</p>`}
          </div>`;

      const postsHtml = data.posts.length
        ? data.posts.map(p => {
            const comments = p.commentCount || 0;
            return `<div class="post-row" onclick="location.href='/community/${esc(p.id)}'">
              <div class="upvote-col">
                <span class="upvote-arrow">▲</span>
                <span class="upvote-count">${p.upvotes || 0}</span>
              </div>
              <div class="post-content">
                <span class="post-title-link">${esc(p.title)}</span>
                <span class="post-meta-line">${timeAgo(p.createdAt)} · ${comments} comment${comments !== 1 ? 's' : ''}</span>
              </div>
            </div>`;
          }).join('')
        : `<p class="no-posts">No posts yet.</p>`;

      document.getElementById('profile-root').innerHTML = `
        <div class="profile-hero">
          <div class="profile-left">
            <h1 class="profile-name">${esc(data.displayName)}</h1>
            ${bioHtml}
          </div>
          <div class="profile-stats">
            <div class="stat-block">
              <div class="stat-value">${data.karma}</div>
              <div class="stat-label">Karma</div>
            </div>
            <div class="stat-block">
              <div class="stat-value">${data.posts.length}</div>
              <div class="stat-label">Posts</div>
            </div>
            ${joined ? `<p class="joined-line">Member since ${joined}</p>` : ''}
          </div>
        </div>
        <p class="posts-section-label">Posts by ${esc(data.displayName)}</p>
        ${postsHtml}
      `;

      document.title = `${data.displayName} — Jibran Qazi`;
    }

    // ── Bio editing ───────────────────────────────────────────────
    function openBioEdit() {
      document.getElementById('bio-display').style.display = 'none';
      document.getElementById('bio-form').classList.add('open');
      document.getElementById('bio-input').focus();
    }

    function closeBioEdit() {
      document.getElementById('bio-display').style.display = '';
      document.getElementById('bio-form').classList.remove('open');
    }

    async function saveBio() {
      const bio = document.getElementById('bio-input').value;
      try {
        const r = await fetch('/api/profile', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${ACCESS}` },
          body: JSON.stringify({ bio })
        });
        if (!r.ok) return;
        profileData.bio = bio.trim().slice(0, 500);
        render(profileData);
      } catch {}
    }

    // ── Load ──────────────────────────────────────────────────────
    async function load() {
      await initAuth();
      try {
        const r = await fetch(`/api/profile/${profileSub}`);
        if (!r.ok) {
          document.getElementById('profile-root').innerHTML = `<p class="error-state">Profile not found.</p>`;
          document.body.classList.add('visible');
          return;
        }
        profileData = await r.json();
        render(profileData);
      } catch {
        document.getElementById('profile-root').innerHTML = `<p class="error-state">Could not load profile.</p>`;
      }
      document.body.classList.add('visible');
    }

    load();
  </script>

</body>
</html>
